# =============================================================================
# Docker Compose for Super Agent Backend - Local Development
# Provides PostgreSQL database, Redis, and the backend service
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # Local development database matching Aurora PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: super-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: super_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d super_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis
  # Used for BullMQ job queues and distributed locks
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: super-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # LocalStack (S3 Mock)
  # Local S3-compatible storage for development
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    container_name: super-agent-localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3
      - DEBUG=0
      - DATA_DIR=/var/lib/localstack/data
      - AWS_DEFAULT_REGION=ap-northeast-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

  # ---------------------------------------------------------------------------
  # Backend Service
  # The Super Agent Backend application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server Configuration
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      # Database Configuration
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/super_agent?schema=public
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Authentication
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      # AWS Configuration (LocalStack)
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      # S3 Configuration
      S3_BUCKET_NAME: super-agent-files
      S3_PRESIGNED_URL_EXPIRES: 3600
      # Logging
      LOG_LEVEL: debug
      # CORS Configuration
      CORS_ORIGIN: http://localhost:5173
      # Claude Agent SDK Configuration
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK:-false}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      AGENT_WORKSPACE_BASE_DIR: /app/workspaces
    ports:
      - "3000:3000"
    volumes:
      - agent_workspaces:/app/workspaces
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Database Migrations
  # Runs Prisma migrations on startup
  # ---------------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: super-agent-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/super_agent?schema=public
    command: npx prisma migrate deploy
    restart: "no"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local
  agent_workspaces:
    driver: local
